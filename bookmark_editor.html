<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Edge收藏夹编辑器</title>
<style>
:root{
  --bg:#f6f8fb;
  --panel:#ffffff;
  --panel-2:#f8fafc;
  --panel-3:#f3f6fb;
  --line:#dde5ef;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#2563eb;
  --accent-weak:#eff6ff;
  --danger:#dc2626;
  --shadow:0 8px 24px rgba(15,23,42,.08);
  --radius:16px;
  --left:320px;
  --right:360px;
}
html[data-theme="dark"]{
  --bg:#0b1220;
  --panel:#111827;
  --panel-2:#0f172a;
  --panel-3:#162033;
  --line:#243041;
  --text:#e5eefb;
  --muted:#93a4bb;
  --accent:#60a5fa;
  --accent-weak:#0f213b;
  --danger:#f87171;
  --shadow:0 12px 28px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
*{scrollbar-width:thin; scrollbar-color: color-mix(in srgb, var(--accent) 26%, var(--line)) transparent;}
*::-webkit-scrollbar{width:14px;height:14px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:color-mix(in srgb, var(--accent) 24%, var(--line)); border-radius:999px; border:4px solid transparent; background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb, var(--accent) 42%, var(--line)); border:4px solid transparent; background-clip:padding-box}
*::-webkit-scrollbar-corner{background:transparent}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
button,input,select,textarea{font:inherit}
button, input, select, textarea { color:var(--text); }
body{overflow:hidden}
.hidden{display:none !important}
.btn{
  border:1px solid var(--line); background:var(--panel-2); color:var(--text); border-radius:12px; padding:9px 12px; cursor:pointer;
}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.soft{background:var(--accent-weak);color:var(--accent);border-color:color-mix(in srgb, var(--accent) 25%, var(--line))}
.btn.danger{color:var(--danger);border-color:color-mix(in srgb, var(--danger) 35%, var(--line)); background:var(--panel-2)}
.app{height:100%;display:grid;grid-template-rows:auto 1fr;gap:14px;padding:14px}
.topbar{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:nowrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700}
.brand .logo{
  display:flex;align-items:center;justify-content:center;color:var(--text);
  font-size:22px; line-height:1; background:transparent; border:none; box-shadow:none;
}
.menu-bar{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;min-width:0;flex:1;justify-content:flex-end}
.theme-btn{width:40px;height:40px;padding:0;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;min-width:0;order:1}
.filter-bar .search-wrap{width:320px;min-width:220px;flex:0 1 320px}
.filter-bar .select{width:180px;flex:0 0 180px}
.menu-bar{order:2}
#btnResetFilters{order:3}
#themeToggleBtn{order:4}
.menu-wrap{position:relative}
.menu-pop{
  position:absolute;top:calc(100% + 8px);left:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
  padding:8px;display:none;min-width:180px;z-index:40
}
.menu-wrap.open .menu-pop{display:block}
.menu-pop button{display:block;width:100%;border:none;background:transparent;text-align:left;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--text)}
.menu-pop button:hover{background:var(--panel-3)}
html[data-theme="dark"] .brand .logo{box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}

.workspace{
  min-height:0; display:grid; grid-template-columns:var(--left) 8px minmax(420px,1fr) 8px var(--right); gap:0;
}
.panel{
  min-width:0; min-height:0; display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
}
.panel-header{
  padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.panel-title{font-weight:700}
.panel-subtools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.panel-body{min-height:0; padding:12px; overflow:auto}
.tree-body{overflow:hidden; min-height:0; display:flex; flex-direction:column; padding:12px 12px 8px 12px}
.tree-scroll-outer{overflow:auto; min-height:0; flex:1 1 auto; width:100%; height:100%; padding:0; margin:0}
.tree-scroll{min-height:100%; width:max-content; min-width:100%; padding-right:8px; padding-bottom:8px}
.splitter{cursor:col-resize; border-radius:999px; align-self:stretch; background:transparent; position:relative}
.splitter::before{content:""; position:absolute; top:8px; bottom:8px; left:3px; right:3px; border-radius:999px; background:var(--line)}
.splitter:hover::before,.splitter.dragging::before{background:var(--accent)}

.search-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.search-wrap{position:relative;min-width:220px;flex:1}
.input,.select,.textarea,.search-input{
  width:100%; border:1px solid var(--line); border-radius:12px; background:var(--panel-2); padding:10px 12px; color:var(--text)
}
.search-input{padding-right:38px}
.clear-btn{
  position:absolute; right:7px; top:50%; transform:translateY(-50%); border:none; width:26px; height:26px; border-radius:999px;
  background:transparent; color:#64748b; cursor:pointer; display:none;
}
.clear-btn.show{display:block}
.clear-btn:hover{background:var(--panel-3)}
.breadcrumbs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.crumb-btn{
  border:1px solid var(--line); background:var(--panel-3); color:var(--text); border-radius:999px; padding:4px 10px; cursor:pointer
}

.tree{display:flex;flex-direction:column;gap:6px; min-width:max-content}
.tree-node{display:flex;flex-direction:column;gap:6px}
.tree-row{
  display:flex; align-items:center; gap:6px; border:1px solid transparent; border-radius:12px; padding:6px 8px; min-height:38px; width:max-content; min-width:100%; user-select:none;
}
.tree-row:hover{background:var(--panel-3);border-color:var(--line)}
.tree-row[draggable="true"]{cursor:grab}
.tree-row.dragging{opacity:.58}
.tree-row.active{background:var(--accent-weak);border-color:color-mix(in srgb, var(--accent) 35%, var(--line))}
.tree-row.drag-over-inside{background:var(--accent-weak);border-color:var(--accent)}
.tree-row.drag-over-before{box-shadow: inset 0 3px 0 var(--accent)}
.tree-row.drag-over-after{box-shadow: inset 0 -3px 0 var(--accent)}
.tree-indent{flex:0 0 auto; width:calc(var(--depth,0) * 18px)}
.tree-toggle{border:none;background:transparent;width:22px;height:22px;border-radius:8px;cursor:pointer;color:var(--muted);flex:0 0 22px}
.tree-toggle:hover{background:var(--panel-3)}
.tree-icon{flex:0 0 auto}
.tree-label{display:flex;align-items:center;gap:6px;min-width:0;cursor:pointer}
.tree-title{white-space:nowrap}
.tree-count{font-size:12px;color:var(--muted);margin-left:4px}
.tree-children{display:flex;flex-direction:column;gap:6px}
.tree-bookmark .tree-title{color:var(--text)}

.list{display:flex;flex-direction:column;gap:10px}
.card{
  display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:start; border:1px solid var(--line); border-radius:16px;
  background:var(--panel-2); padding:12px;
}
.card.active{border-color:#60a5fa; box-shadow:0 0 0 3px rgba(96,165,250,.16)}
.card.dragging{opacity:.5}
.card.drag-over-before{box-shadow:inset 0 3px 0 #60a5fa}
.card.drag-over-after{box-shadow:inset 0 -3px 0 #60a5fa}
.card.drag-over-folder{border-color:var(--accent);background:var(--accent-weak)}
.card-title{font-weight:700;display:flex;align-items:center;gap:8px;word-break:break-word}
.url-text{color:color-mix(in srgb, var(--accent) 92%, white 8%);display:block;margin-top:6px;word-break:break-all}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:12px}
.actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.icon-actions{display:flex;align-items:center;gap:6px}
.icon-btn{
  width:30px;height:30px;padding:0;border-radius:9px;border:1px solid var(--line);
  background:var(--panel);color:var(--muted);cursor:pointer;font-size:15px;line-height:1;
  display:inline-flex;align-items:center;justify-content:center;
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-weak)}
.empty{padding:24px 16px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);text-align:center;background:var(--panel-2)}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:13px;color:var(--muted)}
.textarea{min-height:90px;resize:vertical}
.tag{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--panel-3);border-radius:999px;padding:6px 10px;font-size:12px;color:var(--muted)}

.modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:center;justify-content:center;padding:24px;z-index:60}
.modal-mask.open{display:flex}
.modal{width:min(760px,100%); max-height:min(84vh,900px); background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:12px 16px;overflow:auto}
.helper{font-size:12px;color:var(--muted);line-height:1.65}

@media (max-width:1400px){
  .topbar{flex-wrap:wrap}
  .topbar-right{width:100%;justify-content:space-between}
  .filter-bar{flex-wrap:wrap}
}
@media (max-width:1100px){
  :root{--left:280px;--right:320px}
  .filter-bar .search-wrap{flex:1 1 100%; width:auto}
}
@media (max-width:860px){
  body{overflow:auto}
  .app{height:auto;min-height:100vh}
  .workspace{grid-template-columns:1fr; gap:12px}
  .splitter{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">🌐</div>
      <div>Edge收藏夹编辑器</div>
    </div>
    <div class="topbar-right">
      <div class="filter-bar">
        <div class="search-wrap">
          <input class="search-input" id="searchInput" placeholder="搜索文件夹名、网站名、网址..." />
          <button class="clear-btn" id="btnClearSearch" title="清空">×</button>
        </div>
        <select class="select" id="searchScope">
          <option value="all">全部收藏</option>
          <option value="subtree">当前及子文件夹</option>
          <option value="current">当前文件夹</option>
        </select>
        <select class="select" id="typeFilter">
          <option value="all">全部类型</option>
          <option value="folder">仅文件夹</option>
          <option value="bookmark">仅网址</option>
        </select>
      </div>
      <div class="menu-bar">
        <div class="menu-wrap" id="importMenuWrap">
          <button class="btn" id="importMenuBtn">导入 ▾</button>
          <div class="menu-pop">
            <button id="actionImportHtml">HTML</button>
            <button id="actionImportJson">JSON</button>
            <button id="actionLoadSample">预置</button>
          </div>
        </div>
        <div class="menu-wrap" id="exportMenuWrap">
          <button class="btn primary" id="exportMenuBtn">导出 ▾</button>
          <div class="menu-pop">
            <button id="actionExportHtml">HTML</button>
            <button id="actionExportJson">JSON</button>
          </div>
        </div>
      </div>
      <button class="btn" id="btnResetFilters" title="重置" aria-label="重置">重置</button>
      <button class="btn theme-btn" id="themeToggleBtn" title="切换主题" aria-label="切换主题">🌙</button>
    </div>
  </div>

  <div class="workspace">
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">目录</div>
        <div class="panel-subtools"><div class="tag" id="stats"></div></div>
      </div>
      <div class="panel-body tree-body">
        <div class="tree-scroll-outer"><div class="tree-scroll"><div class="tree" id="tree"></div></div></div>
      </div>
    </section>

    <div class="splitter" id="splitterLeft"></div>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title" id="listTitle">内容</div>
        <div class="panel-subtools">
          <div class="tag" id="listStats"></div>
          <button class="btn" id="btnAddFolderCenter">新建文件夹</button>
          <button class="btn" id="btnAddBookmark">添加网址</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <div class="list" id="list"></div>
      </div>
    </section>

    <div class="splitter" id="splitterRight"></div>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">编辑器</div>
        <div class="tag" id="editorType">未选择</div>
      </div>
      <div class="panel-body">
        <div id="editorEmpty" class="empty">从目录区或内容区选中一个文件夹 / 网址后，即可在这里编辑。</div>
        <div id="editorForm" class="hidden">
          <div class="field"><label>名称</label><input class="input" id="editTitle" /></div>
          <div class="field" id="fieldUrl"><label>网址</label><input class="input" id="editHref" /></div>
          <div class="field"><label>ADD_DATE</label><input class="input" id="editAddDate" /></div>
          <div class="field"><label>LAST_MODIFIED</label><input class="input" id="editLastModified" /></div>
          <div class="panel-subtools" style="margin-top:8px;">
            <button class="btn primary" id="btnSave">保存</button>
            <button class="btn" id="btnMove">移动到文件夹</button>
            <button class="btn danger" id="btnDelete">删除</button>
          </div>
          <div class="helper" style="margin-top:10px;">点击内容卡片即可编辑；双击文件夹可进入；拖动内容区项目可排序或拖入文件夹。</div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="modal-mask" id="moveModalMask">
  <div class="modal">
    <div class="modal-header">
      <div style="font-weight:700;">移动到文件夹</div>
      <button class="btn" id="btnCloseMoveModal">关闭</button>
    </div>
    <div class="modal-body">
      <div class="helper" style="margin-bottom:10px;">请选择目标文件夹，然后点击底部确认移动。</div>
      <div class="tree-scroll"><div class="tree" id="moveTree"></div></div>
      <div class="panel-subtools" style="margin-top:14px; justify-content:flex-end;">
        <button class="btn" id="btnCancelMove">取消</button>
        <button class="btn primary" id="btnConfirmMove">确认移动</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileHtml" accept=".html,text/html" class="hidden" />
<input type="file" id="fileJson" accept=".json,application/json" class="hidden" />

<script>

const state = {
  root: null,
  originalRoot: null,
  selectedFolderId: null,
  selectedItemId: null,
  search: "",
  searchScope: "all",
  typeFilter: "all",
  nextId: 1,
  expanded: new Set(),
  moveTargetFolderId: null,
  draggingId: null,
};

function uid(){ return "n" + (state.nextId++); }

function cloneDeep(obj){ return JSON.parse(JSON.stringify(obj)); }
function reseedIds(root){
  state.nextId = 1;
  function renew(node){
    node.id = uid();
    if (node.type === "folder"){
      node.children = node.children || [];
      node.children.forEach(renew);
    }
  }
  renew(root);
  return root;
}
function createFolder(title="新建文件夹"){ return {id:uid(), type:"folder", title, addDate:"", lastModified:String(Math.floor(Date.now()/1000)), children:[]}; }
function createBookmark(title="新建网址", href="https://"){ return {id:uid(), type:"bookmark", title, href, addDate:String(Math.floor(Date.now()/1000)), lastModified:""}; }
function escapeHtml(s=""){ return String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function escapeAttr(s=""){ return escapeHtml(s); }
function decodeBase64Utf8(base64){ const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0)); return new TextDecoder("utf-8").decode(bytes); }
function downloadText(filename, text, mime="text/plain;charset=utf-8"){ const blob = new Blob([text], {type:mime}); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href=url; a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(url), 1200); }
async function copyTextToClipboard(text){
  const value = String(text || "").trim();
  if (!value) return false;
  if (navigator.clipboard?.writeText){
    try { await navigator.clipboard.writeText(value); return true; } catch {}
  }
  const ta = document.createElement("textarea");
  ta.value = value;
  ta.setAttribute("readonly", "");
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const ok = document.execCommand("copy");
  document.body.removeChild(ta);
  return ok;
}
function openBookmarkUrl(url){
  const href = String(url || "").trim();
  if (!href) return;
  window.open(href, "_blank", "noopener,noreferrer");
}

function parseBookmarkHtml(input){
  const parser = new DOMParser();
  const doc = parser.parseFromString(input, "text/html");
  const mainDL = doc.querySelector("DL");
  state.nextId = 1;
  function readDL(dl){
    const items = []; if (!dl) return items;
    const children = Array.from(dl.children);
    for (let i=0;i<children.length;i++){
      const node = children[i];
      if (node.tagName !== "DT") continue;
      const folderHeader = node.querySelector(":scope > H3");
      const link = node.querySelector(":scope > A");
      if (folderHeader){
        let next = node.nextElementSibling;
        if (!next || next.tagName !== "DL") next = node.querySelector(":scope > DL");
        items.push({
          id: uid(),
          type: "folder",
          title: folderHeader.textContent?.trim() || "未命名文件夹",
          addDate: folderHeader.getAttribute("ADD_DATE") || "",
          lastModified: folderHeader.getAttribute("LAST_MODIFIED") || "",
          personalToolbarFolder: folderHeader.getAttribute("PERSONAL_TOOLBAR_FOLDER") || "",
          children: readDL(next),
        });
      } else if (link){
        items.push({
          id: uid(),
          type: "bookmark",
          title: link.textContent?.trim() || link.getAttribute("HREF") || "未命名网址",
          href: link.getAttribute("HREF") || "",
          addDate: link.getAttribute("ADD_DATE") || "",
          icon: link.getAttribute("ICON") || "",
          lastModified: link.getAttribute("LAST_MODIFIED") || "",
        });
      }
    }
    return items;
  }
  return { id:uid(), type:"folder", title:"全部收藏", addDate:"", lastModified:"", children: readDL(mainDL) };
}

function serializeBookmarkHtml(root){
  function escText(s=""){ return String(s).replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch])); }
  function escAttr(s=""){ return String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
  function folderToHtml(folder, depth=1){
    const indent = "    ".repeat(depth);
    const h3Attrs = [
      folder.addDate ? `ADD_DATE="${escAttr(folder.addDate)}"` : "",
      folder.lastModified ? `LAST_MODIFIED="${escAttr(folder.lastModified)}"` : "",
      folder.personalToolbarFolder ? `PERSONAL_TOOLBAR_FOLDER="${escAttr(folder.personalToolbarFolder)}"` : "",
    ].filter(Boolean).join(" ");
    let html = `${indent}<DT><H3${h3Attrs ? " " + h3Attrs : ""}>${escText(folder.title)}</H3>\n`;
    html += `${indent}<DL><p>\n`;
    for (const child of folder.children){
      if (child.type === "folder") html += folderToHtml(child, depth+1);
      else {
        const attrs = [
          child.href ? `HREF="${escAttr(child.href)}"` : `HREF=""`,
          child.addDate ? `ADD_DATE="${escAttr(child.addDate)}"` : "",
          child.icon ? `ICON="${escAttr(child.icon)}"` : "",
          child.lastModified ? `LAST_MODIFIED="${escAttr(child.lastModified)}"` : "",
        ].filter(Boolean).join(" ");
        html += `${indent}    <DT><A ${attrs}>${escText(child.title)}</A>\n`;
      }
    }
    html += `${indent}</DL><p>\n`;
    return html;
  }
  const head = `<!DOCTYPE NETSCAPE-Bookmark-file-1>
<!-- This is an automatically generated file.
     It will be read and overwritten.
     DO NOT EDIT! -->
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
<TITLE>Bookmarks</TITLE>
<H1>Bookmarks</H1>
<DL><p>
`;
  const body = root.children.map(child => child.type === "folder"
    ? folderToHtml(child, 1)
    : `    <DT><A HREF="${escapeAttr(child.href || "")}"${child.addDate ? ` ADD_DATE="${escapeAttr(child.addDate)}"` : ""}>${child.title || ""}</A>\n`
  ).join("");
  return head + body + `</DL><p>\n`;
}

function walk(node, parent=null, list=[]){
  list.push({node,parent});
  if (node.type === "folder") node.children.forEach(child => walk(child, node, list));
  return list;
}
function findById(id){ return walk(state.root).find(x => x.node.id === id) || null; }
function findParentOf(id){ return walk(state.root).find(x => x.node.type==="folder" && x.node.children.some(c => c.id===id))?.node || null; }
function pathToNode(id){
  const path = [];
  function dfs(node){
    if (node.id === id){ path.push(node); return true; }
    if (node.type === "folder"){
      for (const child of node.children){
        if (dfs(child)){ path.unshift(node); return true; }
      }
    }
    return false;
  }
  dfs(state.root); return path;
}
function getCurrentFolder(){ return findById(state.selectedFolderId)?.node || state.root; }
function selectFolder(id){ state.selectedFolderId=id; state.selectedItemId=id; expandPath(id); render(); }
function selectItem(id){ const info = findById(id); if(!info) return; state.selectedItemId=id; if (info.node.type==="folder") expandPath(id); renderEditor(); renderList(); renderTree(); }
function expandPath(id){ pathToNode(id).forEach(n => state.expanded.add(n.id)); }

function countDirectBookmarkCount(folder){
  return folder.children.filter(x => x.type === "bookmark").length;
}
function countCurrentItems(folder){
  const folders = folder.children.filter(x => x.type === "folder").length;
  const bookmarks = folder.children.filter(x => x.type === "bookmark").length;
  return {folders, bookmarks};
}

function countStats(){
  const all = walk(state.root);
  return {
    folders: Math.max(0, all.filter(x=>x.node.type==="folder").length - 1),
    bookmarks: all.filter(x=>x.node.type==="bookmark").length
  };
}

function matchText(item, q){
  if (!q) return true;
  const text = [item.title || "", item.href || "", item.type].join(" ").toLowerCase();
  return text.includes(q);
}
function matchType(item){
  return state.typeFilter === "all" ? true : item.type === state.typeFilter;
}
function folderDescendants(folder, includeSelf=false, list=[]){
  if (includeSelf) list.push(folder);
  for (const child of folder.children){
    if (child.type === "folder"){
      list.push(child);
      folderDescendants(child, false, list);
    }
  }
  return list;
}
function getSearchBaseFolders(){
  const current = getCurrentFolder();
  if (state.searchScope === "current") return [current];
  if (state.searchScope === "subtree") return [current, ...folderDescendants(current)];
  return [state.root, ...folderDescendants(state.root)];
}
function getVisibleItems(){
  const current = getCurrentFolder();
  const q = state.search.trim().toLowerCase();
  if (!q){
    return current.children.filter(matchType);
  }
  const items = [];
  const seen = new Set();
  for (const folder of getSearchBaseFolders()){
    for (const child of folder.children){
      if (matchText(child, q) && matchType(child) && !seen.has(child.id)){
        items.push(child); seen.add(child.id);
      }
    }
  }
  return items;
}


function clearTreeDragMarkers(){
  document.querySelectorAll(".tree-row").forEach(el => {
    el.classList.remove("drag-over-inside","drag-over-before","drag-over-after");
    delete el.dataset.dropPlace;
  });
}
function canMoveToTarget(itemId, targetFolderId){
  const item = findById(itemId)?.node;
  const target = findById(targetFolderId)?.node;
  if (!item || !target || target.type !== "folder") return false;
  if (item.id === target.id) return false;
  if (item.type === "folder"){
    const desc = walk(item).map(x => x.node.id);
    if (desc.includes(targetFolderId)) return false;
  }
  return true;
}

function buildTree(container, opts={}){
  const {forMove=false, activeId=null} = opts;
  container.innerHTML = "";
  function renderNode(node, depth=0){
    const wrap = document.createElement("div");
    wrap.className = "tree-node";
    const row = document.createElement("div");
    row.className = "tree-row" + (node.id === activeId ? " active" : "") + (node.type === "bookmark" ? " tree-bookmark" : "");
    row.style.setProperty("--depth", depth);

    const indent = document.createElement("span");
    indent.className = "tree-indent";

    let toggle = document.createElement("button");
    toggle.className = "tree-toggle";
    if (node.type === "folder"){
      toggle.textContent = state.expanded.has(node.id) ? "▾" : "▸";
      toggle.onclick = (e) => { e.stopPropagation(); state.expanded.has(node.id) ? state.expanded.delete(node.id) : state.expanded.add(node.id); forMove ? renderMoveTree() : renderTree(); };
    } else {
      toggle.textContent = "";
      toggle.disabled = true;
      toggle.style.visibility = "hidden";
    }

    const label = document.createElement("div");
    label.className = "tree-label";
    const title = node.type === "folder"
      ? `<span class="tree-icon">📁</span><span class="tree-title">${escapeHtml(node.title)}</span><span class="tree-count">${countDirectBookmarkCount(node)}</span>`
      : `<span class="tree-icon">🔗</span><span class="tree-title">${escapeHtml(node.title)}</span>`;
    label.innerHTML = title;

    row.append(indent, toggle, label);

    row.addEventListener("click", () => {
      if (forMove){
        if (node.type === "folder"){ state.moveTargetFolderId = node.id; renderMoveTree(); }
      } else {
        if (node.type === "folder"){ state.selectedFolderId = node.id; state.selectedItemId = node.id; }
        else { state.selectedItemId = node.id; }
        render();
      }
    });
    row.addEventListener("dblclick", () => {
      if (!forMove && node.type === "folder") selectFolder(node.id);
    });

    if (!forMove && node.id !== state.root.id){
      row.draggable = true;
      row.addEventListener("dragstart", e => {
        state.draggingId = node.id;
        row.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
      });
      row.addEventListener("dragend", () => {
        row.classList.remove("dragging");
        state.draggingId = null;
        clearTreeDragMarkers();
      });
      row.addEventListener("dragover", e => {
        if (!state.draggingId) return;
        const draggingId = state.draggingId;
        const draggingNode = findById(draggingId)?.node;
        if (!draggingNode) return;
        let place = "after";
        const rect = row.getBoundingClientRect();
        const offsetY = e.clientY - rect.top;
        if (node.type === "folder" && offsetY > rect.height * 0.28 && offsetY < rect.height * 0.72) {
          if (!canMoveToTarget(draggingId, node.id)) return;
          place = "inside";
        } else {
          if (draggingNode.type === "folder"){
            const desc = walk(draggingNode).map(x=>x.node.id);
            if (desc.includes(node.id)) return;
          }
          place = offsetY < rect.height / 2 ? "before" : "after";
        }
        e.preventDefault();
        clearTreeDragMarkers();
        row.classList.add(place === "inside" ? "drag-over-inside" : (place === "before" ? "drag-over-before" : "drag-over-after"));
        row.dataset.dropPlace = place;
      });
      row.addEventListener("dragleave", e => {
        if (!row.contains(e.relatedTarget)) {
          row.classList.remove("drag-over-inside","drag-over-before","drag-over-after");
          delete row.dataset.dropPlace;
        }
      });
      row.addEventListener("drop", e => {
        if (!state.draggingId) return;
        const place = row.dataset.dropPlace || "after";
        e.preventDefault();
        if (place === "inside") {
          moveItemToFolder(state.draggingId, node.id);
          state.expanded.add(node.id);
        } else {
          moveItemRelativeToTarget(state.draggingId, node.id, place);
        }
        state.draggingId = null;
        clearTreeDragMarkers();
        delete row.dataset.dropPlace;
        render();
      });
    }

    wrap.appendChild(row);
    if (node.type === "folder" && state.expanded.has(node.id)){
      const childrenWrap = document.createElement("div");
      childrenWrap.className = "tree-children";
      node.children.forEach(child => childrenWrap.appendChild(renderNode(child, depth + 1)));
      wrap.appendChild(childrenWrap);
    }
    return wrap;
  }
  container.appendChild(renderNode(state.root, 0));
}
function renderTree(){ buildTree(document.getElementById("tree"), {activeId: state.selectedItemId || state.selectedFolderId}); }
function renderMoveTree(){ buildTree(document.getElementById("moveTree"), {forMove:true, activeId: state.moveTargetFolderId}); }

function renderStats(){
  const s = countStats();
  document.getElementById("stats").textContent = `网址 ${s.bookmarks}`;
}
function renderBreadcrumbs(folder){
  const el = document.getElementById("breadcrumbs");
  el.innerHTML = "";
  const path = pathToNode(folder.id);
  path.forEach((node, idx) => {
    const btn = document.createElement("button");
    btn.className = "crumb-btn";
    btn.textContent = node.title;
    btn.onclick = () => selectFolder(node.id);
    el.appendChild(btn);
    if (idx < path.length - 1){
      const sep = document.createElement("span");
      sep.textContent = "›";
      sep.style.color = "#94a3b8";
      el.appendChild(sep);
    }
  });
}

function clearDragMarkers(scope=document){
  scope.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over-before","drag-over-after","drag-over-folder"));
}
function moveItemToFolder(itemId, targetFolderId, targetIndex=null){
  const owner = findParentOf(itemId);
  const target = findById(targetFolderId)?.node;
  const item = findById(itemId)?.node;
  if (!owner || !target || target.type !== "folder" || !item) return;
  if (item.type === "folder"){
    const desc = walk(item).map(x=>x.node.id);
    if (desc.includes(targetFolderId)) return;
  }
  owner.children = owner.children.filter(c => c.id !== itemId);
  if (targetIndex == null || targetIndex > target.children.length) target.children.push(item);
  else target.children.splice(targetIndex, 0, item);
}

function moveItemRelativeToTarget(itemId, targetId, place){
  const itemOwner = findParentOf(itemId);
  const targetOwner = findParentOf(targetId);
  const target = findById(targetId)?.node;
  if (!itemOwner || !targetOwner || !target) return;
  if (place === "inside"){
    if (target.type !== "folder") return;
    moveItemToFolder(itemId, targetId);
    return;
  }
  const targetIndex = targetOwner.children.findIndex(x => x.id === targetId);
  if (targetIndex === -1) return;
  const item = findById(itemId)?.node;
  if (!item) return;
  if (item.type === "folder"){
    const desc = walk(item).map(x=>x.node.id);
    if (desc.includes(targetId)) return;
  }
  itemOwner.children = itemOwner.children.filter(c => c.id !== itemId);
  const freshIndex = targetOwner.children.findIndex(x => x.id === targetId);
  const insertIndex = place === "before" ? freshIndex : freshIndex + 1;
  targetOwner.children.splice(insertIndex, 0, item);
}

function reorderWithinFolder(folderId, itemId, targetIndex){
  const folder = findById(folderId)?.node;
  if (!folder || folder.type !== "folder") return;
  const idx = folder.children.findIndex(x => x.id === itemId);
  if (idx === -1) return;
  const [item] = folder.children.splice(idx, 1);
  if (targetIndex > idx) targetIndex--;
  folder.children.splice(targetIndex, 0, item);
}

function cardDragEvents(card, item, index, currentFolder){
  if (state.search.trim()) return;
  card.draggable = true;
  card.addEventListener("dragstart", e => { state.draggingId = item.id; card.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
  card.addEventListener("dragend", () => { card.classList.remove("dragging"); state.draggingId = null; clearDragMarkers(); });
  card.addEventListener("dragover", e => {
    if (!state.draggingId || state.draggingId === item.id) return;
    e.preventDefault(); clearDragMarkers();
    const rect = card.getBoundingClientRect();
    const y = e.clientY - rect.top;
    if (item.type === "folder" && y > rect.height * 0.28 && y < rect.height * 0.72) card.classList.add("drag-over-folder");
    else if (y < rect.height/2) card.classList.add("drag-over-before");
    else card.classList.add("drag-over-after");
  });
  card.addEventListener("drop", e => {
    e.preventDefault();
    const draggingId = state.draggingId;
    if (!draggingId || draggingId === item.id) return;
    if (card.classList.contains("drag-over-folder") && item.type === "folder") {
      moveItemToFolder(draggingId, item.id);
    } else {
      const insertIndex = card.classList.contains("drag-over-before") ? index : index + 1;
      const draggingOwner = findParentOf(draggingId);
      if (draggingOwner?.id === currentFolder.id) reorderWithinFolder(currentFolder.id, draggingId, insertIndex);
      else moveItemToFolder(draggingId, currentFolder.id, insertIndex);
    }
    clearDragMarkers();
    render();
  });
}

function renderList(){
  const list = document.getElementById("list");
  const folder = getCurrentFolder();
  const items = getVisibleItems();
  const currentStats = countCurrentItems(folder);
  document.getElementById("listTitle").textContent = "内容：" + folder.title;
  const listStats = [];
  if (currentStats.folders) listStats.push(`文件夹 ${currentStats.folders}`);
  if (currentStats.bookmarks) listStats.push(`网址 ${currentStats.bookmarks}`);
  const listStatsEl = document.getElementById("listStats");
  listStatsEl.textContent = listStats.join(" · ");
  listStatsEl.classList.toggle("hidden", listStats.length === 0);
  renderBreadcrumbs(folder);
  list.innerHTML = "";
  if (!items.length){
    list.innerHTML = `<div class="empty">这里还没有匹配内容。你可以新建文件夹、添加网址，或者切换筛选范围。</div>`;
    return;
  }
  items.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card" + (state.selectedItemId === item.id ? " active" : "");
    const isFolder = item.type === "folder";
    const parent = findParentOf(item.id);
    const pathInfo = parent && parent.id !== folder.id ? "所在路径：" + pathToNode(item.id).map(x=>x.title).join(" / ") : "";
    card.innerHTML = `<div>
      <div class="card-title">${isFolder ? "📁" : "🔗"} <span>${escapeHtml(item.title || "")}</span></div>
      ${!isFolder ? `<div class="url-text">${escapeHtml(item.href || "")}</div>` : ""}
      <div class="meta">
        <span>类型：${isFolder ? "文件夹" : "网址"}</span>
        ${isFolder ? `<span>项目数：${item.children.length}</span>` : ""}
        ${pathInfo ? `<span>${escapeHtml(pathInfo)}</span>` : ""}
      </div>
    </div>
    <div class="actions">
      ${isFolder ? `<button class="btn btn-open">进入</button>` : `<div class="icon-actions"><button class="icon-btn btn-copy-url" title="复制网址" aria-label="复制网址">⧉</button><button class="icon-btn btn-open-url" title="打开网址" aria-label="打开网址">↗</button></div>`}
    </div>`;
    const btnOpen = card.querySelector(".btn-open");
    if (btnOpen) {
      btnOpen.onclick = (e) => {
        e.stopPropagation();
        selectFolder(item.id);
      };
    }
    const btnCopyUrl = card.querySelector(".btn-copy-url");
    if (btnCopyUrl) {
      btnCopyUrl.onclick = async (e) => {
        e.stopPropagation();
        const copied = await copyTextToClipboard(item.href || "");
        btnCopyUrl.textContent = copied ? "✓" : "!";
        setTimeout(() => { btnCopyUrl.textContent = "⧉"; }, 900);
      };
    }
    const btnOpenUrl = card.querySelector(".btn-open-url");
    if (btnOpenUrl) {
      btnOpenUrl.onclick = (e) => {
        e.stopPropagation();
        openBookmarkUrl(item.href);
      };
    }
    card.addEventListener("click", e => {
      if (e.target.closest("button")) return;
      selectItem(item.id);
    });
    card.addEventListener("dblclick", e => {
      if (e.target.closest("button")) return;
      if (isFolder) selectFolder(item.id);
    });
    cardDragEvents(card, item, index, folder);
    list.appendChild(card);
  });
}

function renderEditor(){
  const info = findById(state.selectedItemId);
  const empty = document.getElementById("editorEmpty");
  const form = document.getElementById("editorForm");
  const typeTag = document.getElementById("editorType");
  if (!info){ empty.classList.remove("hidden"); form.classList.add("hidden"); typeTag.textContent = "未选择"; return; }
  const item = info.node; const isFolder = item.type === "folder";
  empty.classList.add("hidden"); form.classList.remove("hidden");
  typeTag.textContent = isFolder ? "文件夹" : "网址";
  document.getElementById("fieldUrl").classList.toggle("hidden", isFolder);
  document.getElementById("editTitle").value = item.title || "";
  document.getElementById("editHref").value = item.href || "";
  document.getElementById("editAddDate").value = item.addDate || "";
  document.getElementById("editLastModified").value = item.lastModified || "";
}
function render(){
  renderStats();
  renderTree();
  renderList();
  renderEditor();
  document.getElementById("btnClearSearch").classList.toggle("show", !!state.search);
}

function saveEditor(){
  const info = findById(state.selectedItemId); if (!info) return;
  const item = info.node;
  item.title = document.getElementById("editTitle").value.trim() || (item.type === "folder" ? "未命名文件夹" : "未命名网址");
  item.addDate = document.getElementById("editAddDate").value.trim();
  item.lastModified = document.getElementById("editLastModified").value.trim();
  if (item.type === "bookmark") item.href = document.getElementById("editHref").value.trim();
  render();
}
function deleteSelected(){
  const itemId = state.selectedItemId;
  const owner = findParentOf(itemId);
  const item = findById(itemId)?.node;
  if (!owner || !item) return alert("根目录不能删除。");
  if (!confirm(`确定删除“${item.title}”吗？`)) return;
  owner.children = owner.children.filter(c => c.id !== itemId);
  state.selectedItemId = owner.id;
  state.selectedFolderId = owner.id;
  render();
}
function addFolder(){

  state.selectedItemId = node.id;
  render();
}
function addBookmark(){

  state.selectedItemId = node.id;

function openMoveModal(){
  const info = findById(state.selectedItemId); if (!info) return;
  state.moveTargetFolderId = findParentOf(info.node.id)?.id || state.root.id;

function closeMoveModal(){ document.getElementById("moveModalMask").classList.remove("open"); }
function confirmMove(){

  moveItemToFolder(itemId, targetFolderId);

function importJson(text){
  const data = JSON.parse(text);
  setRoot(reseedIds(data), {rememberOriginal:true});
}
function setRoot(root, options={}){
  state.root = root;
  if (options.rememberOriginal !== false) state.originalRoot = cloneDeep(root);
  state.selectedFolderId = root.id;
  state.selectedItemId = root.id;

}
function loadPreloaded(){ setRoot(parseBookmarkHtml(decodeBase64Utf8(PRELOADED_BOOKMARK_HTML_BASE64)), {rememberOriginal:true}); }
function restoreOriginalData(){

function applyTheme(theme){

  const btn = document.getElementById("themeToggleBtn");
  if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";

function initTheme(){

  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

function setupMenu(btnId, wrapId){
  const btn = document.getElementById(btnId);
  const wrap = document.getElementById(wrapId);
  btn.onclick = (e) => { e.stopPropagation(); document.querySelectorAll(".menu-wrap").forEach(x => x !== wrap && x.classList.remove("open")); wrap.classList.toggle("open"); };
}

function setupSplitter(splitterId, side){
  const splitter = document.getElementById(splitterId);
  let startX = 0, startVal = 0;
  splitter.addEventListener("mousedown", e => {
    if (window.innerWidth <= 860) return;
    startX = e.clientX;
    startVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue(side === "left" ? "--left" : "--right"));
    splitter.classList.add("dragging");
    const onMove = (ev) => {
      const delta = ev.clientX - startX;
      const val = side === "left" ? startVal + delta : startVal - delta;
      const clamped = Math.max(220, Math.min(560, val));
      document.documentElement.style.setProperty(side === "left" ? "--left" : "--right", clamped + "px");
    };
    const onUp = () => {
      splitter.classList.remove("dragging");
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  });
}
setupSplitter("splitterLeft","left");
setupSplitter("splitterRight","right");

initTheme();
setRoot(createFolder("全部收藏"));
